[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "postgresql"]

[phases.install]
cmds = ["python3 -m pip install --upgrade pip", "python3 -m pip install -r requirements.txt"]

[start]
cmd = "cd wms_project/django_backend && python3 manage.py migrate && gunicorn --bind 0.0.0.0:$PORT --pythonpath . wsgi:application"
